# Q. What is this file?
# A. This file contains options which allow you to configure your multiworld experience while allowing
#    others to play how they want as well.
#
# Q. How do I use it?
# A. The options in this file are weighted. This means the higher number you assign to a value, the
#    more chances you have for that option to be chosen. For example, an option like this:
#
#    map_shuffle:
#      on: 5
#      off: 15
#
#    Means you have 5 chances for map shuffle to occur, and 15 chances for map shuffle to be turned
#    off.
#
# Q. I've never seen a file like this before. What characters am I allowed to use?
# A. This is a .yaml file. You are allowed to use most characters.
#    To test if your yaml is valid or not, you can use this website:
#        http://www.yamllint.com/
#    You can also verify that your Archipelago options are valid at this site:
#        https://archipelago.gg/check

# Your name in-game, limited to 16 characters.
#     {player} will be replaced with the player's slot number.
#     {PLAYER} will be replaced with the player's slot number, if that slot number is greater than 1.
#     {number} will be replaced with the counter value of the name.
#     {NUMBER} will be replaced with the counter value of the name, if the counter value is greater than 1.
name: Player{number}

# Used to describe your yaml. Useful if you have multiple files.
description: Default Manual_Tekken3_NaruSnake Template

game: Manual_Tekken3_NaruSnake
requires:
  version: 0.6.7 # Version of Archipelago required for this yaml to work as expected.

Manual_Tekken3_NaruSnake:
  ################
  # Game Options #
  ################
  progression_balancing:
    # A system that can move progression earlier, to try and prevent the player from getting stuck and bored early.
    # 
    # A lower setting means more getting stuck. A higher setting means less getting stuck.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 0
    # Maximum value is 99
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-0-99: 0 # random value between 0 and 99
    disabled: 0 # equivalent to 0
    normal: 50 # equivalent to 50
    extreme: 0 # equivalent to 99

  accessibility:
    # Set rules for reachability of your items/locations.
    # 
    # **Full:** ensure everything can be reached and acquired.
    # 
    # **Minimal:** ensure what is needed to reach your goal can be acquired.
    full: 50
    minimal: 0

  goal:
    # How to End your Randomized playthrough.
    king of iron fist tournament token: 50
    all arcade mode clear: 0
    all arcade mode clear with boys: 0
    all arcade mode clear with girls: 0
    all tekken ball mode clear: 0
    all tekken ball mode clear with boys: 0
    all tekken ball mode clear with girls: 0
    all time attack mode clear: 0
    all time attack mode clear with boys: 0
    all time attack mode clear with girls: 0
    all tekken force mode clear: 0
    all tekken force mode clear with boys: 0
    all tekken force mode clear with girls: 0
    all survival mode clear: 0
    all survival mode clear with boys: 0
    all survival mode clear with girls: 0
    full game completion: 0
    full game completion with boys: 0
    full game completion with girls: 0
    full game completion + king of iron fist tournament token: 0
    full game completion  + king of iron fist tournament token with boys: 0
    full game completion  + king of iron fist tournament token with girls: 0

  ##############
  # Game Modes #
  ##############
  arcade_mode:
    # Include Arcade Mode progression items and Arcade Mode checks.
    # If an Arcade Mode goal is selected, this option is forced on to keep the goal reachable.
    'false': 0
    'true': 50

  time_attack_mode:
    # Include Time Attack Mode progression items and Time Attack Mode checks.
    # If a Time Attack Mode goal is selected, this option is forced on to keep the goal reachable.
    'false': 0
    'true': 50

  survival_mode:
    # Include Survival Mode progression items and Survival Mode checks.
    # If a Survival Mode goal is selected, this option is forced on to keep the goal reachable.
    'false': 0
    'true': 50

  team_battle_mode:
    # Include Team Battle Mode progression items and Team Battle Mode checks.
    # Full Game Completion goals adapt to the enabled game modes.
    'false': 0
    'true': 50

  tekken_ball_mode:
    # Include Tekken Ball Mode progression items, ball items, and Tekken Ball checks.
    # If a Tekken Ball Mode goal is selected, this option is forced on to keep the goal reachable.
    'false': 0
    'true': 50

  tekken_force_mode:
    # Include Tekken Force Mode progression items and Tekken Force checks.
    # If a Tekken Force Mode goal is selected, this option is forced on to keep the goal reachable.
    'false': 0
    'true': 50

  ####################
  # Gameplay Options #
  ####################
  difficulty:
    # Add Difficulty setting items to the item pool.
    # Disabled by default so players can opt in only when they want this extra setting layer.
    'false': 50
    'true': 0

  fight_count:
    # Add Fight Count setting items to the item pool.
    # Disabled by default so players can opt in only when they want this extra setting layer.
    'false': 50
    'true': 0

  round_time:
    # Add Round Time setting items to the item pool.
    # Disabled by default so players can opt in only when they want this extra setting layer.
    'false': 50
    'true': 0

  ################
  # Goal Options #
  ################
  kift_emblems_required:
    # Choose how many KIFT Emblems are required for King of Iron Fist Tournament emblem goals.
    # KIFT Emblems are only added to the item pool when the selected goal requires them.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 1
    # Maximum value is 100
    100: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-1-100: 0 # random value between 1 and 100

  kift_emblems_available_percentage:
    # Controls how many KIFT Emblem items are placed compared to the required amount.
    # 100 means only the required amount is placed. 200 means double the required amount is placed.
    # For example, 25 required tokens with 200 percent will place 50 KIFT Emblems in the item pool.
    # The final amount is capped at 100 KIFT Emblems.
    #
    # You can define additional values between the minimum and maximum values.
    # Minimum value is 100
    # Maximum value is 400
    100: 50
    random: 0
    random-low: 0 # random value weighted towards lower values
    random-high: 0 # random value weighted towards higher values
    random-range-100-400: 0 # random value between 100 and 400

  ###########################
  # Item & Location Options #
  ###########################
  local_items:
    # Forces these items to be in their native world.
    []

  non_local_items:
    # Forces these items to be outside their native world.
    []

  start_inventory:
    # Start with the specified amount of these items. Example: "Bomb: 1"
    {}

  start_inventory_from_pool:
    # Start with the specified amount of these items and don't place them in the world. Example: "Bomb: 1"
    # 
    # The game decides what the replacement items will be.
    {}

  start_hints:
    # Start with these item's locations prefilled into the ``!hint`` command.
    []

  start_location_hints:
    # Start with these locations and their item prefilled into the ``!hint`` command.
    []

  exclude_locations:
    # Prevent these locations from having an important item.
    []

  priority_locations:
    # Prevent these locations from having an unimportant item.
    []

  item_links:
    # Share part of your item pool with other players.
    []

  plando_items:
    # Generic items plando.
    []
